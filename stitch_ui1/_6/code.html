<h1 class="font-display-lg text-headline-md text-primary">Lesson Butler</h1>
</div>
<span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform" data-icon="calendar_month">calendar_month</span>
</header>
<main class="px-container-margin pt-lg space-y-lg opacity-40 select-none pointer-events-none">
<section class="space-y-md">
<h2 class="font-headline-sm text-headline-sm text-text-main">我的课程</h2>
<!-- Dummy Card 1 -->
<div class="bg-surface-container-lowest p-md rounded-xl custom-shadow space-y-sm">
<div class="flex justify-between items-start">
<h3 class="font-headline-sm text-headline-sm text-primary">乐高创意机器人</h3>
<span class="bg-secondary-container text-on-secondary-container text-label-md font-label-md px-sm py-base rounded-full">每周三 16:30</span>
</div>
<div class="space-y-base">
<div class="flex justify-between text-label-md text-text-muted">

<span>8/12</span>
</div>
<div class="w-full h-2 bg-primary-container/20 rounded-full overflow-hidden">
<div class="h-full bg-primary-container" style="width: 66%"></div>
</div>
</div>
</div>
<!-- Dummy Card 2 -->
<div class="bg-surface-container-lowest p-md rounded-xl custom-shadow space-y-sm">
<div class="flex justify-between items-start">
<h3 class="font-headline-sm text-headline-sm text-primary">少儿芭蕾初级班</h3>
<span class="bg-secondary-container text-on-secondary-container text-label-md font-label-md px-sm py-base rounded-full">每周六 10:00</span>

<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-sm rounded-[32px] p-xl space-y-lg custom-shadow modal-bounce relative overflow-hidden">
<!-- Visual Decor (Squishy Sticker Background) -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container/10 rounded-full blur-2xl"></div>
<!-- Warning Icon Section -->
<div class="flex justify-center">
<div class="w-20 h-20 bg-error-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[40px] text-error" data-icon="delete_forever">delete_forever</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-sm">

                    您正在尝试删除 <span class="font-bold text-primary">乐高创意机器人</span>。删除后相关课程记录、考勤及剩余课时<span class="text-danger-red font-bold">数据不可恢复</span>。
                </p>
</div>

<button class="w-full h-[56px] bg-danger-red text-on-primary font-label-lg text-label-lg rounded-full active:scale-95 transition-all shadow-md shadow-danger-red/20" id="confirmDelete">

                </button>
<button class="w-full h-[56px] bg-surface-container-high text-text-main font-label-lg text-label-lg rounded-full active:scale-95 transition-all" id="cancelDelete">

                </button>

<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-lg text-label-lg">已成功移除班级</span>

</div>

<span class="font-label-md text-label-md">Classes</span>
</div>

<span class="font-label-md text-label-md">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Me</span>
</div>

<script>
        const deleteModal = document.getElementById('deleteModal');
        const confirmDeleteBtn = document.getElementById('confirmDelete');
        const cancelDeleteBtn = document.getElementById('cancelDelete');
        const successToast = document.getElementById('successToast');

        // Interaction for Cancel Button
        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.add('opacity-0');
            setTimeout(() => {
                deleteModal.style.display = 'none';
                // Reset for demo purposes - usually would navigate back
            }, 300);
        });

        // Interaction for Confirm Delete
        confirmDeleteBtn.addEventListener('click', () => {
            // Simulated delete logic
            confirmDeleteBtn.disabled = true;
            confirmDeleteBtn.innerHTML = '<span class="animate-spin material-symbols-outlined">sync</span>';
            
            setTimeout(() => {
                // Hide modal
                deleteModal.classList.add('opacity-0');
                
                // Show success sticker
                setTimeout(() => {
                    deleteModal.style.display = 'none';
                    successToast.classList.remove('hidden');
                    
                    // Hide toast after animation
                    setTimeout(() => {
                        successToast.classList.add('opacity-0');
                        setTimeout(() => {
                            successToast.classList.add('hidden');
                            successToast.classList.remove('opacity-0');
                            // Re-show modal for repeated testing in prototype
                            deleteModal.style.display = 'flex';
                            deleteModal.classList.remove('opacity-0');
                            confirmDeleteBtn.disabled = false;
                            confirmDeleteBtn.innerHTML = '确认删除';
                        }, 500);
                    }, 2000);
                }, 300);
            }, 800);
        });

        // Close on clicking overlay (optional UX pattern)
        deleteModal.addEventListener('click', (e) => {
            if (e.target === deleteModal) {
                cancelDeleteBtn.click();
            }
        });
    </script>
