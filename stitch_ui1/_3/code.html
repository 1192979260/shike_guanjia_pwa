<script>
        // Weekday selector logic
        const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        const picker = document.getElementById('weekday-picker');
        const template = document.getElementById('day-template');

        days.forEach(day => {
            const clone = template.content.cloneNode(true);
            const btn = clone.querySelector('button');
            btn.querySelector('span').textContent = day;
            
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('bg-primary');
                if (isActive) {
                    btn.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    btn.classList.add('border-outline-variant', 'text-on-surface-variant');
                } else {
                    btn.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                    btn.classList.remove('border-outline-variant', 'text-on-surface-variant');
                    // Tactile haptic feedback feel
                    btn.style.transform = 'scale(1.1)';
                    setTimeout(() => btn.style.transform = 'scale(1)', 150);
                }
            });
            
            picker.appendChild(clone);
        });

        // Submit animation logic
        const submitBtn = document.getElementById('submit-btn');
        const successOverlay = document.getElementById('success-sticker');
        const stickerGraphic = document.getElementById('sticker-graphic');

        submitBtn.addEventListener('click', () => {
            // Simulate processing
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 正在创建...';

            setTimeout(() => {
                successOverlay.classList.remove('opacity-0');
                successOverlay.classList.add('opacity-100');
                stickerGraphic.classList.remove('scale-50');
                stickerGraphic.classList.add('scale-100');

                // Redirect after success animation
                setTimeout(() => {
                    alert('课程创建成功！Butler 已为您安排妥当。');
                    window.location.reload();
                }, 1500);
            }, 800);
        });
    </script>
