<body class="flex flex-col min-h-screen">
<!-- Main Content Canvas -->

<!-- Header / Identity Area -->

<div class="relative mb-lg">
<div class="w-24 h-24 bg-primary-container rounded-full flex items-center justify-center animate-float overflow-hidden shadow-lg border-4 border-white">
<span class="material-symbols-outlined text-on-primary-container text-[48px]" style="font-variation-settings: 'FILL' 1;">child_care</span>
</div>
<!-- Decorative Sticker Elements -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-warning-orange rounded-full flex items-center justify-center border-2 border-white shadow-sm">
<span class="material-symbols-outlined text-white text-lg">star</span>
</div>
</div>
<h1 class="font-display-lg text-display-lg text-primary text-center">Lesson Butler</h1>
<p class="font-body-lg text-body-lg text-text-muted text-center mt-xs">让课程管理变得如拆开贴纸书般轻松</p>
</header>
<!-- Form Area -->
<section class="w-full space-y-lg">
<!-- Welcome Title -->
<div class="text-left w-full mb-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">欢迎回来</h2>
<p class="font-body-md text-body-md text-on-surface-variant">输入手机号，开启有序的一天</p>
</div>
<!-- Login Inputs -->
<div class="space-y-md">
<!-- Phone Number Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs">手机号码</label>
<div class="group relative flex items-center bg-white border-2 border-outline-variant rounded-xl px-md py-sm transition-all duration-300 input-focus-ring focus-within:shadow-md">
<span class="material-symbols-outlined text-outline mr-sm">phone_iphone</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-lg p-0 placeholder:text-outline-variant" maxlength="11" placeholder="请输入11位手机号" type="tel"/>
</div>
</div>
<!-- Verification Code Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs">验证码</label>
<div class="flex gap-md">
<div class="group relative flex-grow flex items-center bg-white border-2 border-outline-variant rounded-xl px-md py-sm transition-all duration-300 input-focus-ring focus-within:shadow-md">
<span class="material-symbols-outlined text-outline mr-sm">verified_user</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-lg p-0 placeholder:text-outline-variant" maxlength="6" placeholder="6位验证码" type="number"/>
</div>
<button class="whitespace-nowrap px-md bg-secondary-fixed text-on-secondary-fixed-variant font-label-lg rounded-xl transition-all duration-200 hover:bg-secondary-container active:scale-95 border-2 border-transparent" id="getCodeBtn">
                            获取验证码
                        </button>
</div>
</div>
</div>
<!-- Agreement Checkbox -->

<div class="pt-1">
<input class="w-5 h-5 rounded-md border-2 border-outline-variant text-primary focus:ring-primary-container transition-all cursor-pointer" id="agreement" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="agreement">
                    我已阅读并同意 <span class="text-primary font-label-lg">《用户协议》</span> 与 <span class="text-primary font-label-lg">《隐私政策》</span>
</label>

<div class="pt-md">

</button>

<!-- Micro-interaction Script -->
<script>
        // Get Code Button Timer Logic
        const getCodeBtn = document.getElementById('getCodeBtn');
        let timer = null;
        let countdown = 60;

        getCodeBtn.addEventListener('click', () => {
            if (timer) return;
            
            getCodeBtn.classList.add('opacity-50', 'cursor-not-allowed');
            getCodeBtn.innerText = `${countdown}s 后重新获取`;
            
            timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    timer = null;
                    countdown = 60;
                    getCodeBtn.innerText = '获取验证码';
                    getCodeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    getCodeBtn.innerText = `${countdown}s 后重新获取`;
                }
            }, 1000);
        });

        // Login Button Feedback
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.addEventListener('click', () => {
            const agreement = document.getElementById('agreement').checked;
            if (!agreement) {
                // Shake animation for terms
                const termsLabel = loginBtn.parentElement.previousElementSibling;
                termsLabel.classList.add('animate-pulse', 'text-error');
                setTimeout(() => {
                    termsLabel.classList.remove('animate-pulse', 'text-error');
                }, 1000);
                return;
            }

            // Success Visual Feedback
            loginBtn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                <span>加载中...</span>
            `;
            loginBtn.classList.add('bg-success-green');
            
            setTimeout(() => {
                loginBtn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>欢迎开启！</span>
                `;
            }, 1200);
        });
    </script>
