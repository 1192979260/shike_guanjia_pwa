<!-- Controls -->
<div class="px-container-margin pb-xl pt-md flex flex-col items-center gap-xl relative z-10">
<!-- Pagination Dots -->
<div class="flex gap-xs">
<div class="h-2 rounded-full active-dot transition-all duration-300 bg-primary-container" id="dot-0"></div>
<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300" id="dot-1"></div>
<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300" id="dot-2"></div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full h-12 bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-full flex items-center justify-center gap-xs shadow-lg active:scale-95 transition-all" id="next-btn">
<span>继续探索</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full h-12 text-on-surface-variant font-label-lg text-label-lg rounded-full hover:bg-surface-container-low transition-colors" id="skip-btn">
                跳过引导
            </button>
</div>
</div>
<script>
        let currentStep = 0;
        const totalSteps = 3;
        const steps = document.querySelectorAll('[data-step]');
        const dots = [document.getElementById('dot-0'), document.getElementById('dot-1'), document.getElementById('dot-2')];
        const nextBtn = document.getElementById('next-btn');
        const skipBtn = document.getElementById('skip-btn');

        function updateCarousel() {
            steps.forEach((step, index) => {
                const stepNum = parseInt(step.dataset.step);
                if (stepNum === currentStep) {
                    step.classList.remove('translate-x-full', '-translate-x-full', 'opacity-0');
                    step.classList.add('translate-x-0', 'opacity-100');
                } else if (stepNum < currentStep) {
                    step.classList.remove('translate-x-0', 'translate-x-full', 'opacity-100');
                    step.classList.add('-translate-x-full', 'opacity-0');
                } else {
                    step.classList.remove('translate-x-0', '-translate-x-full', 'opacity-100');
                    step.classList.add('translate-x-full', 'opacity-0');
                }
            });

            dots.forEach((dot, index) => {
                if (index === currentStep) {
                    dot.classList.add('active-dot', 'bg-primary-container');
                    dot.classList.remove('w-2', 'bg-outline-variant');
                } else {
                    dot.classList.remove('active-dot', 'bg-primary-container');
                    dot.classList.add('w-2', 'bg-outline-variant');
                }
            });

            if (currentStep === totalSteps - 1) {
                nextBtn.innerHTML = `<span>立即开启</span><span class="material-symbols-outlined">rocket_launch</span>`;
                nextBtn.classList.replace('bg-primary-container', 'bg-primary');
                nextBtn.classList.replace('text-on-primary-container', 'text-on-primary');
                skipBtn.style.visibility = 'hidden';
            } else {
                nextBtn.innerHTML = `<span>继续探索</span><span class="material-symbols-outlined">arrow_forward</span>`;
                nextBtn.classList.replace('bg-primary', 'bg-primary-container');
                nextBtn.classList.replace('text-on-primary', 'text-on-primary-container');
                skipBtn.style.visibility = 'visible';
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < totalSteps - 1) {
                currentStep++;
                updateCarousel();
            } else {
                // Final Action: Complete Onboarding
                nextBtn.classList.add('scale-90');
                setTimeout(() => {
                    alert('欢迎开启您的 Lesson Butler 之旅！');
                    // In a real app, redirection happens here
                }, 150);
            }
        });

        skipBtn.addEventListener('click', () => {
            currentStep = totalSteps - 1;
            updateCarousel();
        });

        // Simple touch/swipe detection for mobile feel
        let touchStartX = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) { // Swipe Left
                if (currentStep < totalSteps - 1) {
                    currentStep++;
                    updateCarousel();
                }
            } else if (touchEndX - touchStartX > 50) { // Swipe Right
                if (currentStep > 0) {
                    currentStep--;
                    updateCarousel();
                }
            }
        }, false);
    </script>
