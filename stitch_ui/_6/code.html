<!-- Interaction Script -->
<script>
        const sheet = document.getElementById('bottom-sheet');
        const backdrop = document.getElementById('backdrop');
        const closeBtn = document.getElementById('close-sheet');

        function toggleSheet(show) {
            if (show) {
                sheet.style.transform = 'translateY(0)';
                backdrop.style.opacity = '1';
                backdrop.style.pointerEvents = 'auto';
            } else {
                sheet.style.transform = 'translateY(100%)';
                backdrop.style.opacity = '0';
                backdrop.style.pointerEvents = 'none';
            }
        }

        closeBtn.addEventListener('click', () => toggleSheet(false));
        backdrop.addEventListener('click', () => toggleSheet(false));

        // Interaction for "Edit" etc
        document.querySelectorAll('button.grid-cols-2 > button').forEach(btn => {
            btn.addEventListener('click', () => {
                const label = btn.querySelector('span:last-child').innerText;
                console.log('Action triggered:', label);
                // In a real app, this would navigate or open a form
                setTimeout(() => toggleSheet(false), 200);
            });
        });
    </script>
