<script>
        function triggerSuccess(button) {
            // Success "Sticker" animation
            const sticker = document.createElement('div');
            sticker.innerHTML = `
                <div class="fixed inset-0 flex items-center justify-center z-[60] pointer-events-none">
                    <div class="bg-primary-container text-white p-6 rounded-full shadow-2xl flex flex-col items-center gap-2 animate-bounce-in">
                        <span class="material-symbols-outlined text-6xl" style="font-variation-settings: 'FILL' 1;">stars</span>
                        <span class="font-headline-sm">获得印章！</span>
                    </div>
                </div>
            `;
            document.body.appendChild(sticker);
            
            // Add custom animation class
            const style = document.createElement('style');
            style.textContent = `
                @keyframes bounce-in {
                    0% { transform: scale(0); opacity: 0; }
                    50% { transform: scale(1.2); opacity: 1; }
                    100% { transform: scale(1); opacity: 1; }
                }
                .animate-bounce-in {
                    animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
                }
            `;
            document.head.appendChild(style);

            // Confetti simulation (simplified)
            for(let i=0; i<15; i++) {
                createConfetti();
            }

            setTimeout(() => {
                sticker.classList.add('opacity-0', 'transition-opacity', 'duration-500');
                setTimeout(() => sticker.remove(), 500);
            }, 2000);
        }

        function createConfetti() {
            const colors = ['#FF8C9E', '#FFB3BF', '#9D3F51', '#FFD9DD'];
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.width = '10px';
            confetti.style.height = '10px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = '50%';
            confetti.style.zIndex = '100';
            confetti.style.pointerEvents = 'none';
            document.body.appendChild(confetti);

            const animation = confetti.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 2000 + 1000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            animation.onfinish = () => confetti.remove();
        }
    </script>
