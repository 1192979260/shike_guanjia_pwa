<html class="light" lang="zh-CN"><head>

<!-- Success Sticker Animation Script -->
<script>
        document.getElementById('checkinBtn').addEventListener('click', function() {
            const sticker = document.createElement('div');
            sticker.innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none">
                    <div class="bg-white rounded-full p-8 shadow-2xl animate-bounce border-4 border-primary-container">
                        <span class="material-symbols-outlined text-[100px] text-primary-container" style="font-variation-settings: 'FILL' 1;">grade</span>
                        <div class="absolute -top-4 -right-4 bg-warning-orange text-white px-4 py-2 rounded-full font-headline-sm rotate-12">太棒了!</div>
                    </div>
                </div>
            `;
            document.body.appendChild(sticker);
            
            // Confetti effect simulation
            for(let i=0; i<20; i++) {
                const conf = document.createElement('div');
                conf.className = 'fixed z-[99] w-3 h-3 rounded-full pointer-events-none';
                conf.style.backgroundColor = ['#FF8C9E', '#FFB3BF', '#FFD9DE'][Math.floor(Math.random()*3)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '100vh';
                conf.style.transition = 'all 2s ease-out';
                document.body.appendChild(conf);
                setTimeout(() => {
                    conf.style.transform = `translate(${(Math.random()-0.5)*300}px, -120vh) rotate(${Math.random()*360}deg)`;
                    conf.style.opacity = '0';
                }, 50);
            }

            setTimeout(() => {
                sticker.remove();
                this.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    已打卡！
                `;
                this.classList.replace('bg-primary-container', 'bg-success-green');
                this.classList.replace('text-on-primary-container', 'text-white');
            }, 1500);
        });
    </script>
