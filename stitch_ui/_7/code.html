<script>
        // Gender selection interaction
        const btnBoy = document.getElementById('btn-boy');
        const btnGirl = document.getElementById('btn-girl');

        const selectGender = (active, inactive) => {
            active.classList.add('bg-primary-container', 'text-white', 'border-transparent');
            active.classList.remove('bg-white', 'text-on-surface-variant');
            inactive.classList.remove('bg-primary-container', 'text-white', 'border-transparent');
            inactive.classList.add('bg-white', 'text-on-surface-variant');
        };

        btnBoy.addEventListener('click', () => selectGender(btnBoy, btnGirl));
        btnGirl.addEventListener('click', () => selectGender(btnGirl, btnBoy));

        // Mock Avatar Preview
        const avatarInput = document.getElementById('avatar-input');
        const avatarPreview = document.getElementById('avatar-preview');
        avatarInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarPreview.src = e.target.result;
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Save Interaction
        const saveBtn = document.getElementById('save-btn');
        const overlay = document.getElementById('success-overlay');
        const sticker = document.getElementById('sticker-popup');

        saveBtn.addEventListener('click', () => {
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            sticker.classList.remove('scale-50');
            sticker.classList.add('scale-100');
            
            // Simple bounce animation
            sticker.animate([
                { transform: 'scale(0.8)' },
                { transform: 'scale(1.1)' },
                { transform: 'scale(1)' }
            ], { duration: 500, easing: 'ease-out' });

            setTimeout(() => {
                overlay.classList.add('opacity-0', 'pointer-events-none');
                sticker.classList.add('scale-50');
                sticker.classList.remove('scale-100');
            }, 2000);
        });
    </script>
